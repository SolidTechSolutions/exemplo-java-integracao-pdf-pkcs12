spring.web.resources.add-mappings=true
server.port=8088
app.name=SolidSign-Example-PDF-PKCS12
app.version=1.0.0
app.locale=en_US

# [EN]    Base URL of the SolidSign API (without path)
# [PT-BR] URL base da API SolidSign (sem o caminho)
# [ES]    URL base de la API SolidSign (sin la ruta)
solidsign.api.base-url=http://localhost:8080/
#https://solidsign.com.br/

# [EN]    Authorization header value — include "Bearer " prefix
# [PT-BR] Valor do header Authorization — inclua o prefixo "Bearer "
# [ES]    Valor del header Authorization — incluya el prefijo "Bearer "
solidsign.api.authorization=eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiJrZXkuc29saWRzaWduLmFwcGxpY2F0aW9uLjIiLCJhcHBOYW1lIjoiVGVzdCBBcHAiLCJ1c2VyTmFtZSI6InNvbGlkc2lnbiIsImlzcyI6InNvbGlkc2lnbi5jb20uYnIvc29saWRzaWduL2F1dGgvcHVibGljLWtleSIsImlhdCI6MTc3OTU3MTM4NiwiZXhwIjoxNzc5NTc0OTg2fQ.Wz1UleZ6QUiJDTlqtzwwWgcwCk7jVOy123hq58ZRkO7b6G-3XAQws2pYeH86JIuhsh8Fp7Xwaf3bLGZo_vJgFA68yclJ-qK8cFDTViU6f3JUimi0aS-y5tSQbH1oUvro5tf94hmVZ0KDnzvZdZ9tflYvv0RE4ZGs3LxWL-EC7hjNUHtPZGMLC2WVOb4nF34VZ_fNb8v0dTPWApLfi7AHFw6guIpbOm6UlAOj5T1FXFfI0XcqyLi59WCVqmctHrRUsL5U0vShygNufdWnF7vCsmx5HQhTYnaVOsPxvr9lB4WXRz-_rv5xfxEaf-zyj_wD7TeQx7bbGyyHl-D7_X6Z9A

# [EN]    UUID of the PKCS#12 certificate previously imported via:
# [PT-BR] UUID do certificado PKCS#12 previamente importado via:
# [ES]    UUID del certificado PKCS#12 previamente importado mediante:
#   POST /solidsign/dsig/certificates/pkcs12/import
# [EN]    Upload the .pfx + pfxPassword (base64) once; use the returned "id" here.
# [PT-BR] Envie o .pfx + pfxPassword (base64) uma única vez; use o "id" retornado aqui.
# [ES]    Envíe el .pfx + pfxPassword (base64) una sola vez; use el "id" retornado aquí.
solidsign.cert.id=82e227ab-8422-45a1-9936-478283c8c490

# [EN]    Input folder — only .pdf files will be picked up
# [PT-BR] Pasta de entrada — apenas arquivos .pdf serão processados
# [ES]    Carpeta de entrada — solo se procesarán archivos .pdf
solidsign.batch.input-path=C://Users//acer//Desktop//input_pdfs

# [EN]    Output folder where the signed ZIP will be saved
# [PT-BR] Pasta de saída onde o ZIP assinado será salvo
# [ES]    Carpeta de salida donde se guardará el ZIP firmado
solidsign.batch.output-path=C://Users//acer//Desktop//signed_results

# [EN]    Hash algorithm for the signature (SHA256, SHA384, SHA512)
# [PT-BR] Algoritmo de hash para a assinatura (SHA256, SHA384, SHA512)
# [ES]    Algoritmo de hash para la firma (SHA256, SHA384, SHA512)
solidsign.sig.hashAlgorithm=SHA256

# [EN]    Signature profile: ADRB, ADRT, ADRC, ADRA, PDF_BASIC, PDF_TIMESTAMP, PDF_COMPLETE, PADES_B, PADES_T, PADES_LT, PADES_LTA
# [PT-BR] Perfil de assinatura: ADRB, ADRT, ADRC, ADRA, PDF_BASIC, PDF_TIMESTAMP, PDF_COMPLETE, PADES_B, PADES_T, PADES_LT, PADES_LTA
# [ES]    Perfil de firma: ADRB, ADRT, ADRC, ADRA, PDF_BASIC, PDF_TIMESTAMP, PDF_COMPLETE, PADES_B, PADES_T, PADES_LT, PADES_LTA
solidsign.sig.profile=ADRB

# [EN]    Optional: policy version — uncomment to override the API default
# [PT-BR] Opcional: versão da política — descomente para sobrescrever o padrão da API
# [ES]    Opcional: versión de la política — descomente para sobreescribir el valor por defecto de la API

# [EN]    Measurement unit for visual signature field coordinates (PIXELS or CENTIMETERS)
# [PT-BR] Unidade de medida para as coordenadas do campo de assinatura visual (PIXELS ou CENTIMETERS)
# [ES]    Unidad de medida para las coordenadas del campo de firma visual (PIXELS o CENTIMETERS)
solidsign.sig.sigFieldMeasurementUnit=PIXELS

# [EN]    Visual signature field configuration as JSON array (pageNumber, coordinateX, coordinateY, width, height)
# [PT-BR] Configuração do campo de assinatura visual como array JSON (pageNumber, coordinateX, coordinateY, width, height)
# [ES]    Configuración del campo de firma visual como array JSON (pageNumber, coordinateX, coordinateY, width, height)
solidsign.sig.signatureFieldConfig=[{"pageNumber":1,"coordinateX":200,"coordinateY":380,"width":200,"height":80}]

# [EN]    Comma-separated list of signature image paths (one per document, or repeat the same)
# [PT-BR] Lista de caminhos de imagens separados por vírgula (uma por documento, ou repita a mesma)
# [ES]    Lista de rutas de imagen separadas por coma (una por documento, o repita la misma)
solidsign.sig.signatureImagePaths=C:/Users/User/Desktop/stamp_signature.jpeg

# [EN]    Reason for the signature — displayed in the PDF signature panel
# [PT-BR] Motivo da assinatura — exibido no painel de assinaturas do PDF
# [ES]    Motivo de la firma — se muestra en el panel de firmas del PDF
solidsign.sig.reason=Assinatura digital

# [EN]    Signing location — displayed in the PDF signature panel
# [PT-BR] Local da assinatura — exibido no painel de assinaturas do PDF
# [ES]    Lugar de firma — se muestra en el panel de firmas del PDF
solidsign.sig.location=Brasil

# [EN]    Contact information of the signer — displayed in the PDF signature panel
# [PT-BR] Informações de contato do assinante — exibido no painel de assinaturas do PDF
# [ES]    Información de contacto del firmante — se muestra en el panel de firmas del PDF
solidsign.sig.contact=contato@suaempresa.com.br

# [EN]    Optional: name of a pre-existing signature field in the PDF to target (leave blank to create a new field)
# [PT-BR] Opcional: nome de um campo de assinatura pré-existente no PDF (deixe em branco para criar um novo campo)
# [ES]    Opcional: nombre de un campo de firma preexistente en el PDF (deje en blanco para crear uno nuevo)
# solidsign.sig.signatureFieldName=SignatureField1

# [EN]    Optional: text overlays as JSON array (pageNumber, coordinateX, coordinateY, text, fontSize, textColor)
# [PT-BR] Opcional: sobreposições de texto como array JSON (pageNumber, coordinateX, coordinateY, text, fontSize, textColor)
# [ES]    Opcional: superposiciones de texto como array JSON (pageNumber, coordinateX, coordinateY, text, fontSize, textColor)
# solidsign.sig.signatureTextConfig=[{"pageNumber":1,"coordinateX":200,"coordinateY":460,"text":"Assinado digitalmente","fontSize":10,"textColor":"BLACK"}]

# [EN]    Optional: MDP permission level for certification signatures (1=no changes, 2=forms allowed, 3=annotations allowed)
# [PT-BR] Opcional: nível de permissão MDP para assinaturas de certificação (1=sem alterações, 2=formulários, 3=anotações)
# [ES]    Opcional: nivel de permiso MDP para firmas de certificación (1=sin cambios, 2=formularios, 3=anotaciones)
# solidsign.sig.mdpPermissionLevel=1

# [EN]    Optional: JSON array of per-document open passwords for encrypted PDFs (e.g. ["password1",null,"password3"])
# [PT-BR] Opcional: array JSON de senhas por documento para PDFs protegidos (ex: ["senha1",null,"senha3"])
# [ES]    Opcional: array JSON de contraseñas por documento para PDFs protegidos (p.ej. ["contraseña1",null])
# solidsign.sig.passwordsForDecryption=["YOUR_PASSWORD"]

# [EN]    Optional: JSON map with PDF document metadata (title, author, subject, keywords, creator)
# [PT-BR] Opcional: mapa JSON com metadados do documento PDF (title, author, subject, keywords, creator)
# [ES]    Opcional: mapa JSON con metad

# [EN]    Optional: policy OID — leave commented to use the API default for your profile
# [PT-BR] Opcional: OID da política — deixe comentado para usar o padrão da API para o perfil
# [ES]    Opcional: OID de la política — deje comentado para usar el valor por defecto de la API
# solidsign.sig.policyVersion=2.16.76.1.7.1.11.1.3
